<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人效率風格 - 卡牌排序挑戰</title>
    <style>
        :root {
            /* 柔和材質色調 */
            --bg-base: #F0F2F6; /* 低飽和、高明度的溫和底色 */
            --text-main: #2D3142; /* 深灰藍，比純黑更友善 */
            --text-muted: #9094A6;
            --theme-accent: #4F46E5; /* 輕量主色調：靛藍 */
            --theme-accent-hover: #4338CA;
            --theme-danger: #EF4444;

            /* 微浮雕核心陰影：結合暗影與亮光 */
            --soft-out-shadow: 6px 6px 16px rgba(163, 177, 198, 0.6), -6px -6px 16px rgba(255, 255, 255, 0.8);
            --soft-out-shadow-hover: 10px 10px 24px rgba(163, 177, 198, 0.7), -10px -10px 24px rgba(255, 255, 255, 0.9);
            --soft-in-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.8);
            
            /* 180ms 柔和彈性曲線 */
            --soft-transition: all 180ms cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg-base);
            margin: 0;
            padding: 20px 15px 160px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
            touch-action: manipulation;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            margin: 15px 0 20px; 
            font-size: 1.8rem; 
            font-weight: 600;
            text-align: center; 
            letter-spacing: -0.3px;
            color: var(--text-main);
        }

        /* 膠囊小工具面板 */
        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            margin-bottom: 35px;
            font-weight: 500;
            background: var(--bg-base);
            padding: 10px 24px;
            border-radius: 40px; /* 完美膠囊按鈕 */
            box-shadow: var(--soft-out-shadow);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .stats div {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats span { 
            font-weight: 600; 
        }

        /* 主控制板/舞台 */
        #area-1 {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 240px;
            padding: 35px 25px;
            background: var(--bg-base);
            border-radius: 32px; /* 大圓角 */
            box-shadow: var(--soft-in-shadow); /* 舞台內嵌質感 */
            margin-bottom: 40px;
            width: 100%;
            max-width: 1020px;
            box-sizing: border-box;
        }

        /* 窄條「放這裡」插槽：內凹質感，Active時亮起 */
        .slot {
            width: 50px;
            height: 155px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem; 
            color: var(--text-muted);
            writing-mode: vertical-lr; 
            letter-spacing: 2px;
            transition: var(--soft-transition);
            font-weight: 500;
            cursor: pointer;
            background: var(--bg-base);
            box-shadow: var(--soft-in-shadow); /* 預設內凹 */
            border: none;
            box-sizing: border-box;
        }
        
        /* 觸摸/懸停時：槽位輕微浮起並亮起主色 */
        .slot:hover, .slot:active {
            box-shadow: var(--soft-out-shadow);
            color: var(--theme-accent);
            transform: scale(1.02);
        }

        .slot.disabled {
            pointer-events: none;
            opacity: 0.4;
        }

        /* 霧面大圓角卡片 */
        .card {
            width: 110px;
            height: 155px;
            background-color: var(--bg-base);
            border-radius: 20px; /* 柔和圓角 */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--soft-out-shadow); /* 外浮雕 */
            user-select: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            transition: var(--soft-transition);
            border: 1px solid rgba(255, 255, 255, 0.5); /* 精緻邊緣微高光 */
            box-sizing: border-box;
        }

        .board-card {
            cursor: default;
        }

        /* 懸停：模擬精緻上浮 */
        .board-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--soft-out-shadow-hover);
            z-index: 5;
        }

        /* 抽牌區卡片：更強烈的懸浮感 */
        .current-card-style {
            box-shadow: var(--soft-out-shadow-hover);
        }

        /* 線性極簡角標 */
        .card-value-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--bg-base);
            color: var(--text-main);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: var(--soft-out-shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* 底部中央控制面板 */
        #area-2 {
            position: fixed;
            bottom: 20px; left: 50%; 
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 600px;
            background: rgba(240, 242, 246, 0.85); /* 霧面半透明融於背景 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 8;
            box-shadow: var(--soft-out-shadow-hover);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .instruction {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.2px;
        }

        #draw-area {
            perspective: 800px;
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 答錯時的柔和震動 */
        @keyframes soft-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .shake { 
            animation: soft-shake 0.3s ease-in-out both; 
            box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2), var(--soft-out-shadow);
        }

        /* 覆蓋面板 */
        #start-screen, #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        #game-over { display: none; }
        
        h2 { 
            font-size: 2.2rem; 
            margin: 0 0 12px 0; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        p { 
            font-size: 1rem; 
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        
        /* 核心操作：少量的鮮艷色塊突出（膠囊按鈕與模擬按壓） */
        button {
            padding: 14px 48px;
            font-size: 1rem;
            background: var(--theme-accent);
            color: white;
            border: none;
            border-radius: 40px; /* 完美膠囊 */
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 8px 16px rgba(79, 70, 229, 0.25);
            transition: var(--soft-transition);
        }
        
        button:hover { 
            background: var(--theme-accent-hover); 
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(79, 70, 229, 0.35);
        }
        /* 按下瞬間：下沉反饋 */
        button:active { 
            transform: translateY(1px); 
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }
        button:disabled {
            background: #E2E8F0; color: #94A3B8; box-shadow: none; cursor: not-allowed;
        }

        /* ================= RWD 行動裝置優化 ================= */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            body { padding: 15px 10px 240px; }
            
            #area-1 { 
                gap: 8px; padding: 20px 10px; border-radius: 24px; min-height: 140px; margin-bottom: 20px;
            }
            
            .slot { 
                width: 34px; height: 100px; font-size: 0.6rem; border-radius: 10px; 
            }
            
            .card { 
                width: 70px; height: 100px; border-radius: 14px; 
            }
            
            .board-card:hover { transform: none !important; }
            .card-value-badge { 
                width: 20px; height: 20px; font-size: 0.7rem; bottom: 6px; right: 6px; 
            }
            
            #area-2 { bottom: 15px; width: calc(100% - 20px); padding: 15px; gap: 10px; }
            #draw-area { height: 115px; }
            h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="youtube-player" style="display: none;"></div>

    <div id="start-screen">
        <h2>卡牌排序挑戰</h2>
        <p>優雅、專注、放鬆的效率體驗</p>
        <button id="init-btn">進入空間</button>
    </div>

    <h1>卡牌排序挑戰</h1>
    <div class="stats">
        <div>進度 <span id="card-count" style="color: var(--theme-accent);">3 / 10</span></div>
        <div>失誤 <span id="mistake-count" style="color: var(--theme-danger);">0</span></div>
        <div>⏱️ 時間 <span id="timer-count">0秒</span></div>
    </div>

    <div id="area-1"></div>

    <div id="area-2">
        <div class="instruction">輕觸上方內嵌槽位判定卡牌插入點</div>
        <div id="draw-area"></div>
    </div>

    <div id="game-over">
        <h2>挑戰完成</h2>
        <p>總計時：<strong id="final-time" style="color: var(--theme-accent); font-size: 1.3rem;">0秒</strong> &nbsp;&nbsp; 錯誤次數：<strong id="final-mistakes" style="color: var(--theme-danger); font-size: 1.3rem;">0</strong></p>
        <button onclick="startGame()">重啟挑戰</button>
    </div>

    <script>
        // --- YouTube IFrame API ---
        let ytPlayer; let isPlayerReady = false;
        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: 'x2fAnFXDj9Q',
                playerVars: { 'autoplay': 0, 'controls': 0, 'origin': window.location.origin },
                events: {
                    'onReady': () => { 
                        isPlayerReady = true; 
                        document.getElementById('init-btn').innerText = '進入空間';
                        document.getElementById('init-btn').disabled = false;
                    }
                }
            });
        }

        document.getElementById('init-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            startGame();
        });

        const allCardsData = [
            { id: 1, value: 1, src: 'images/01.png', ytId: 'iV4qduCR3MU' },
            { id: 2, value: 2, src: 'images/02.png', ytId: 'eG5Zm8ZAutI' },
            { id: 3, value: 3, src: 'images/03.png', ytId: 'OTnVTUdyT30' },
            { id: 4, value: 4, src: 'images/04.png', ytId: 'iV4qduCR3MU' }, 
            { id: 5, value: 5, src: 'images/05.png', ytId: 'eG5Zm8ZAutI' }, 
            { id: 6, value: 6, src: 'images/06.png', ytId: 'OTnVTUdyT30' }, 
            { id: 7, value: 7, src: 'images/07.png', ytId: 'iV4qduCR3MU' }, 
            { id: 8, value: 8, src: 'images/08.png', ytId: 'eG5Zm8ZAutI' }, 
            { id: 9, value: 9, src: 'images/09.png', ytId: 'OTnVTUdyT30' }, 
            { id: 10, value: 10, src: 'images/10.png', ytId: 'iV4qduCR3MU' },
            { id: 11, value: 11, src: 'images/11.png', ytId: 'eG5Zm8ZAutI' },
            { id: 12, value: 12, src: 'images/12.png', ytId: 'OTnVTUdyT30' },
            { id: 13, value: 13, src: 'images/13.png', ytId: 'iV4qduCR3MU' },
            { id: 14, value: 14, src: 'images/14.png', ytId: 'eG5Zm8ZAutI' },
            { id: 15, value: 15, src: 'images/15.png', ytId: 'OTnVTUdyT30' },
            { id: 16, value: 16, src: 'images/16.png', ytId: 'iV4qduCR3MU' },
            { id: 17, value: 17, src: 'images/17.png', ytId: 'eG5Zm8ZAutI' },
            { id: 18, value: 18, src: 'images/18.png', ytId: 'OTnVTUdyT30' },
            { id: 19, value: 19, src: 'images/19.png', ytId: 'iV4qduCR3MU' },
            { id: 20, value: 20, src: 'images/20.png', ytId: 'eG5Zm8ZAutI' },
            { id: 21, value: 21, src: 'images/21.png', ytId: 'OTnVTUdyT30' },
            { id: 22, value: 22, src: 'images/22.png', ytId: 'iV4qduCR3MU' },
            { id: 23, value: 23, src: 'images/23.png', ytId: 'eG5Zm8ZAutI' },
            { id: 24, value: 24, src: 'images/24.png', ytId: 'OTnVTUdyT30' },
            { id: 25, value: 25, src: 'images/25.png', ytId: 'iV4qduCR3MU' },
            { id: 26, value: 26, src: 'images/26.png', ytId: 'eG5Zm8ZAutI' },
            { id: 27, value: 27, src: 'images/27.png', ytId: 'OTnVTUdyT30' },
            { id: 28, value: 28, src: 'images/28.png', ytId: 'iV4qduCR3MU' },
            { id: 29, value: 29, src: 'images/29.png', ytId: 'eG5Zm8ZAutI' },
            { id: 30, value: 30, src: 'images/30.png', ytId: 'OTnVTUdyT30' }
        ];

        let deck = []; let board = []; let currentCard = null; let mistakes = 0;
        let timerInterval = null; let elapsedSeconds = 0;
        const TARGET_CARDS = 10; const TOTAL_CARDS_IN_DB = 30; 

        const area1 = document.getElementById('area-1'); const drawArea = document.getElementById('draw-area');
        const mistakeCountEl = document.getElementById('mistake-count'); const cardCountEl = document.getElementById('card-count');
        const timerCountEl = document.getElementById('timer-count'); const gameOverScreen = document.getElementById('game-over');

        function startGame() {
            deck = [...allCardsData]; shuffleDeck(deck); board = []; mistakes = 0;
            updateStats(); gameOverScreen.style.display = 'none';
            for(let i = 0; i < 3; i++) { board.push(deck.pop()); }
            board.sort((a, b) => a.value - b.value);
            drawNewCard(); renderBoard(); startTimer();
        }

        function shuffleDeck(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function drawNewCard() {
            currentCard = deck.pop(); renderDrawnCard();
            if (isPlayerReady && currentCard && currentCard.ytId) {
                ytPlayer.loadVideoById(currentCard.ytId); ytPlayer.playVideo();
            }
        }

        function updateStats() {
            mistakeCountEl.innerText = mistakes;
            cardCountEl.innerText = `${board.length} / ${TARGET_CARDS}`;
        }

        function startTimer() {
            clearInterval(timerInterval); elapsedSeconds = 0; timerCountEl.innerText = "0秒";
            timerInterval = setInterval(() => { elapsedSeconds++; timerCountEl.innerText = `${elapsedSeconds}秒`; }, 1000);
        }

        function renderBoard() {
            area1.innerHTML = '';
            for (let i = 0; i <= board.length; i++) {
                let showSlot = true;
                if (i > 0 && i < board.length) {
                    if (board[i].value - board[i-1].value <= 1) showSlot = false;
                } else if (i === 0 && board.length > 0) {
                    if (board[0].value === 1) showSlot = false;
                } else if (i === board.length && board.length > 0) {
                    if (board[board.length - 1].value === TOTAL_CARDS_IN_DB) showSlot = false;
                }

                if (showSlot) {
                    const slot = document.createElement('div');
                    slot.className = 'slot'; slot.innerText = '放這裡'; slot.dataset.index = i;
                    slot.addEventListener('click', (e) => { if (currentCard) processPlacement(parseInt(e.currentTarget.dataset.index)); });
                    area1.appendChild(slot);
                }

                if (i < board.length) {
                    const cardData = board[i];
                    const card = document.createElement('div');
                    card.className = 'card board-card';
                    card.style.backgroundImage = `url('${cardData.src}')`;
                    const badge = document.createElement('div');
                    badge.className = 'card-value-badge'; badge.innerText = cardData.value;
                    card.appendChild(badge);
                    area1.appendChild(card);
                }
            }
        }

        function renderDrawnCard() {
            drawArea.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'card current-card-style'; card.id = 'current-drag-card';
            card.style.backgroundImage = `url('${currentCard.src}')`;
            drawArea.appendChild(card);
        }

        function processPlacement(dropIndex) {
            const correctIndex = getCorrectIndex(currentCard);
            const dragCardElement = document.getElementById('current-drag-card');

            if (dropIndex === correctIndex) {
                board.splice(correctIndex, 0, currentCard); updateStats();
                if (board.length >= TARGET_CARDS) { renderBoard(); setTimeout(endGame, 300); } 
                else { drawNewCard(); renderBoard(); }
            } else {
                mistakes++; updateStats();
                const allSlots = document.querySelectorAll('.slot');
                allSlots.forEach(s => s.classList.add('disabled'));
                if(dragCardElement) {
                    dragCardElement.classList.add('shake');
                    setTimeout(() => { dragCardElement.classList.remove('shake'); allSlots.forEach(s => s.classList.remove('disabled')); }, 400); 
                }
            }
        }

        function getCorrectIndex(cardToPlace) {
            for (let i = 0; i < board.length; i++) { if (cardToPlace.value < board[i].value) return i; }
            return board.length;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-time').innerText = `${elapsedSeconds}秒`;
            document.getElementById('final-mistakes').innerText = mistakes;
            gameOverScreen.style.display = 'flex';
            if (isPlayerReady) ytPlayer.pauseVideo();
        }
    </script>
</body>
</html>
