<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圖片卡牌排序遊戲</title>
    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-surface: #FFFFFF;
            --apple-text: #1D1D1F;
            --apple-text-secondary: #86868B;
            --apple-blue: #0071E3;
            --apple-blue-hover: #0077ED;
            --apple-red: #FF3B30;
            --apple-green: #34C759;
            --apple-border: #D2D2D7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--apple-bg);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--apple-text);
            touch-action: manipulation;
        }

        h1 { 
            margin: 10px 0 20px; 
            font-size: 2rem; 
            font-weight: 600;
            text-align: center; 
            letter-spacing: -0.5px;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 0.95rem;
            margin-bottom: 25px;
            font-weight: 500;
            background: var(--apple-surface);
            padding: 10px 20px;
            border-radius: 980px;
            border: 1px solid var(--apple-border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            color: var(--apple-text-secondary);
        }
        
        .stats span { 
            font-weight: 600; 
            color: var(--apple-text);
        }

        #area-1 {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            min-height: 170px;
            padding: 20px;
            background: var(--apple-surface);
            border-radius: 20px;
            border: 1px solid var(--apple-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-bottom: 40px;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
        }

        .slot {
            width: 80px;
            height: 115px;
            border: 2px dashed #C7C7CC;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--apple-text-secondary);
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-weight: 500;
            cursor: pointer;
            background-color: var(--apple-bg);
        }
        
        .slot.drag-over, .slot:active {
            background-color: rgba(0, 113, 227, 0.08);
            border-color: var(--apple-blue);
            color: var(--apple-blue);
            transform: scale(1.03);
        }

        .card {
            width: 90px;
            height: 125px;
            background-color: var(--apple-surface);
            border: 1px solid var(--apple-border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
            user-select: none;
            cursor: grab;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card.selected {
            border: 2px solid var(--apple-blue);
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 113, 227, 0.15);
        }

        .board-card {
            cursor: default;
            margin: 0 2px;
        }

        .card-value-badge {
            position: absolute;
            bottom: -8px;
            right: -8px;
            background: var(--apple-surface);
            color: var(--apple-text);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid var(--apple-border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        #area-2 {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .instruction {
            font-size: 0.9rem;
            color: var(--apple-text-secondary);
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.5px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { 
            animation: shake 0.4s ease-in-out; 
            border-color: var(--apple-red) !important; 
            box-shadow: 0 4px 14px rgba(255, 59, 48, 0.2) !important;
        }

        #start-screen, #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--apple-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #game-over { display: none; }
        
        h2 { 
            font-size: 2.5rem; 
            margin: 0 0 10px 0; 
            font-weight: 600;
            text-align: center;
        }
        
        p { 
            font-size: 1.1rem; 
            color: var(--apple-text-secondary);
            margin-bottom: 30px;
        }
        
        button {
            padding: 12px 32px;
            font-size: 1.05rem;
            background: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 980px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s ease, transform 0.1s ease;
        }
        
        button:hover { background: var(--apple-blue-hover); }
        button:active { transform: scale(0.96); }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .slot { width: 50px; height: 75px; font-size: 0.75rem; border-width: 1px; border-radius: 10px; }
            .card { width: 60px; height: 85px; border-radius: 10px; }
            .card-value-badge { width: 22px; height: 22px; font-size: 0.75rem; bottom: -6px; right: -6px; }
            #area-1 { gap: 8px; padding: 15px; border-radius: 16px; }
            .instruction { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="youtube-player" style="display: none;"></div>

    <div id="start-screen">
        <h2>卡牌排序挑戰</h2>
        <p>準備好接受挑戰了嗎？</p>
        <button id="init-btn">開始遊戲</button>
    </div>

    <h1>卡牌排序挑戰</h1>
    <div class="stats">
        <div>進度：<span id="card-count" style="color: var(--apple-blue);">3 / 10</span></div>
        <div>錯誤：<span id="mistake-count" style="color: var(--apple-red);">0</span></div>
    </div>

    <div id="area-1"></div>

    <div id="area-2">
        <div class="instruction">電腦可拖曳卡牌，手機請點擊卡牌後再點擊上方空位</div>
        <div id="draw-area"></div>
    </div>

    <div id="game-over">
        <h2>挑戰完成</h2>
        <p>您的總錯誤次數為：<strong id="final-mistakes" style="color: var(--apple-red); font-size: 1.2rem;">0</strong> 次</p>
        <button onclick="startGame()">再玩一次</button>
    </div>

    <script>
        // --- YouTube IFrame API 區塊 ---
        let ytPlayer;
        let isPlayerReady = false;

        // 動態載入 YouTube API 腳本
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'x2fAnFXDj9Q', // 初始預設載入歌曲
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 0,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': () => { 
                        isPlayerReady = true; 
                        document.getElementById('init-btn').innerText = '開始遊戲';
                        document.getElementById('init-btn').disabled = false;
                    }
                }
            });
        }

        document.getElementById('init-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            startGame();
        });
        
        document.getElementById('init-btn').innerText = '載入音樂中...';
        document.getElementById('init-btn').disabled = true;

        // --- 核心修改：在每張卡牌的資料中直接指定歌曲的 YouTube 影片 ID (ytId) ---
        const allCardsData = [
            { id: 1, value: 1, src: 'images/01.png', ytId: 'iV4qduCR3MU' }, // 卡片 1 的指定歌曲
            { id: 2, value: 2, src: 'images/02.png', ytId: 'eG5Zm8ZAutI' }, // 卡片 2 的指定歌曲
            { id: 3, value: 3, src: 'images/03.png', ytId: 'OTnVTUdyT30' }, // 卡片 3 的指定歌曲
            { id: 4, value: 4, src: 'images/04.png', ytId: 'iV4qduCR3MU' }, 
            { id: 5, value: 5, src: 'images/05.png', ytId: 'eG5Zm8ZAutI' }, 
            { id: 6, value: 6, src: 'images/06.png', ytId: 'OTnVTUdyT30' }, 
            { id: 7, value: 7, src: 'images/07.png', ytId: 'iV4qduCR3MU' }, 
            { id: 8, value: 8, src: 'images/08.png', ytId: 'eG5Zm8ZAutI' }, 
            { id: 9, value: 9, src: 'images/09.png', ytId: 'OTnVTUdyT30' }, 
            { id: 10, value: 10, src: 'images/10.png', ytId: 'iV4qduCR3MU' },
            { id: 11, value: 11, src: 'images/11.png', ytId: 'eG5Zm8ZAutI' },
            { id: 12, value: 12, src: 'images/12.png', ytId: 'OTnVTUdyT30' },
            { id: 13, value: 13, src: 'images/13.png', ytId: 'iV4qduCR3MU' },
            { id: 14, value: 14, src: 'images/14.png', ytId: 'eG5Zm8ZAutI' },
            { id: 15, value: 15, src: 'images/15.png', ytId: 'OTnVTUdyT30' },
            { id: 16, value: 16, src: 'images/16.png', ytId: 'iV4qduCR3MU' },
            { id: 17, value: 17, src: 'images/17.png', ytId: 'eG5Zm8ZAutI' },
            { id: 18, value: 18, src: 'images/18.png', ytId: 'OTnVTUdyT30' },
            { id: 19, value: 19, src: 'images/19.png', ytId: 'iV4qduCR3MU' },
            { id: 20, value: 20, src: 'images/20.png', ytId: 'eG5Zm8ZAutI' },
            { id: 21, value: 21, src: 'images/21.png', ytId: 'OTnVTUdyT30' },
            { id: 22, value: 22, src: 'images/22.png', ytId: 'iV4qduCR3MU' },
            { id: 23, value: 23, src: 'images/23.png', ytId: 'eG5Zm8ZAutI' },
            { id: 24, value: 24, src: 'images/24.png', ytId: 'OTnVTUdyT30' },
            { id: 25, value: 25, src: 'images/25.png', ytId: 'iV4qduCR3MU' },
            { id: 26, value: 26, src: 'images/26.png', ytId: 'eG5Zm8ZAutI' },
            { id: 27, value: 27, src: 'images/27.png', ytId: 'OTnVTUdyT30' },
            { id: 28, value: 28, src: 'images/28.png', ytId: 'iV4qduCR3MU' },
            { id: 29, value: 29, src: 'images/29.png', ytId: 'eG5Zm8ZAutI' },
            { id: 30, value: 30, src: 'images/30.png', ytId: 'OTnVTUdyT30' }
        ];

        let deck = [];
        let board = [];
        let currentCard = null;
        let mistakes = 0;
        let isCardSelected = false; 

        const TARGET_CARDS = 10; 
        const TOTAL_CARDS_IN_DB = 30; 

        const area1 = document.getElementById('area-1');
        const drawArea = document.getElementById('draw-area');
        const mistakeCountEl = document.getElementById('mistake-count');
        const cardCountEl = document.getElementById('card-count');
        const gameOverScreen = document.getElementById('game-over');

        function startGame() {
            deck = [...allCardsData];
            shuffleDeck(deck);

            board = [];
            mistakes = 0;
            isCardSelected = false;
            updateStats();
            gameOverScreen.style.display = 'none';

            for(let i = 0; i < 3; i++) {
                board.push(deck.pop());
            }
            board.sort((a, b) => a.value - b.value);

            drawNewCard();
            renderBoard();
        }

        function shuffleDeck(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- 修改點：直接讀取當前抽中卡牌的指定的歌曲欄位 (currentCard.ytId) ---
        function drawNewCard() {
            currentCard = deck.pop();
            isCardSelected = false; 
            renderDrawnCard();

            // 如果播放器準備好，且這張卡牌有設定 ytId，就直接載入並播放
            if (isPlayerReady && currentCard && currentCard.ytId) {
                ytPlayer.loadVideoById(currentCard.ytId);
                ytPlayer.playVideo();
            }
        }

        function updateStats() {
            mistakeCountEl.innerText = mistakes;
            cardCountEl.innerText = `${board.length} / ${TARGET_CARDS}`;
        }

        function renderBoard() {
            area1.innerHTML = '';
            
            for (let i = 0; i <= board.length; i++) {
                let showSlot = true;
                
                if (i > 0 && i < board.length) {
                    if (board[i].value - board[i-1].value <= 1) showSlot = false;
                } else if (i === 0 && board.length > 0) {
                    if (board[0].value === 1) showSlot = false;
                } else if (i === board.length && board.length > 0) {
                    if (board[board.length - 1].value === TOTAL_CARDS_IN_DB) showSlot = false;
                }

                if (showSlot) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.innerText = '放這裡';
                    slot.dataset.index = i;
                    
                    slot.addEventListener('dragover', handleDragOver);
                    slot.addEventListener('dragleave', handleDragLeave);
                    slot.addEventListener('drop', handleDrop);

                    slot.addEventListener('click', (e) => {
                        if (isCardSelected) {
                            processPlacement(parseInt(e.currentTarget.dataset.index));
                        }
                    });
                    
                    area1.appendChild(slot);
                }

                if (i < board.length) {
                    const cardData = board[i];
                    const card = document.createElement('div');
                    card.className = 'card board-card';
                    card.style.backgroundImage = `url('${cardData.src}')`;

                    const badge = document.createElement('div');
                    badge.className = 'card-value-badge';
                    badge.innerText = cardData.value;
                    card.appendChild(badge);

                    area1.appendChild(card);
                }
            }
        }

        function renderDrawnCard() {
            drawArea.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'card';
            card.draggable = true;
            card.id = 'current-drag-card';
            card.style.backgroundImage = `url('${currentCard.src}')`;

            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', currentCard.id);
                setTimeout(() => card.style.opacity = '0.5', 0);
            });
            card.addEventListener('dragend', () => {
                card.style.opacity = '1';
            });

            card.addEventListener('click', () => {
                isCardSelected = true;
                card.classList.add('selected');
            });

            drawArea.appendChild(card);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            const slot = e.currentTarget;
            slot.classList.remove('drag-over');
            processPlacement(parseInt(slot.dataset.index));
        }

        function processPlacement(dropIndex) {
            const correctIndex = getCorrectIndex(currentCard);
            const dragCardElement = document.getElementById('current-drag-card');

            if (dropIndex === correctIndex) {
                board.splice(correctIndex, 0, currentCard);
                updateStats();
                
                if (board.length >= TARGET_CARDS) {
                    renderBoard();
                    setTimeout(endGame, 300);
                } else {
                    drawNewCard();
                    renderBoard();
                }
            } else {
                mistakes++;
                updateStats();
                isCardSelected = false; 
                if(dragCardElement) {
                    dragCardElement.classList.remove('selected');
                    dragCardElement.classList.add('shake');
                    setTimeout(() => {
                        dragCardElement.classList.remove('shake');
                    }, 400);
                }
            }
        }

        // 修正：答錯不需要重播或重新抽歌，保持原本抽到的歌繼續播

        function getCorrectIndex(cardToPlace) {
            for (let i = 0; i < board.length; i++) {
                if (cardToPlace.value < board[i].value) {
                    return i;
                }
            }
            return board.length;
        }

        function endGame() {
            document.getElementById('final-mistakes').innerText = mistakes;
            gameOverScreen.style.display = 'flex';
            if (isPlayerReady) ytPlayer.pauseVideo();
        }
    </script>
</body>
</html>
